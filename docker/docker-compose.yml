services:
  backend:
    image: ghcr.io/jullylacs/delivery-backend:latest
    container_name: delivery-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ----- System -----
      - TZ=America/Sao_Paulo
      # ----- PostgreSQL -----
      - DB_DIALECT=postgres
      - DB_HOST=localhost
      - DB_PORT=5432
      - DB_NAME=delivery_sys
      - DB_USER=postgres
      - DB_PASS=sua_senha_aqui
      - DB_SSL=false
      - DB_SSL_REJECT_UNAUTHORIZED=false
      # ----- Server -----
      - HOST=localhost
      - PORT=3000
      - NODE_ENV=development
      # ----- API -----
      - API_BASE_PATH=/api/v1
      - ENABLE_LEGACY_ROUTES=false
      - REQUEST_BODY_LIMIT=5mb
      - GLOBAL_RATE_LIMIT_WINDOW_MS=900000
      - GLOBAL_RATE_LIMIT_MAX=5000
      # ----- Security -----
      - JWT_SECRET=troque_por_uma_chave_segura_64_caracteres
      - JWT_REFRESH_SECRET=troque_por_uma_chave_segura_64_caracteres
      - SYSTEM_API_TOKEN=troque_por_uma_chave_segura_64_caracteres
      # ----- Network -----
      - FRONTEND_URL=http://localhost:5173
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,https://delivery.nvxnetworks.com

  frontend:
    image: ghcr.io/jullylacs/delivery-frontend:latest
    container_name: delivery-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      # ----- System -----
      - TZ=America/Sao_Paulo
      # ----- Backend API -----
      - VITE_API_PROTOCOL=https
      - VITE_API_HOST=delivery.nvxnetworks.com
      - VITE_API_PORT=443
