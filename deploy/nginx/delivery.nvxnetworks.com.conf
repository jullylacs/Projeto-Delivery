# Nginx - Delivery Frontend + Backend API
# Frontend: https://delivery.nvxnetworks.com/
# Backend:  https://delivery.nvxnetworks.com/api/v1/*

server {
    listen 80;
    server_name delivery.nvxnetworks.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name delivery.nvxnetworks.com;

    # TLS certificate (update these paths to your environment)
    ssl_certificate /etc/letsencrypt/live/delivery.nvxnetworks.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/delivery.nvxnetworks.com/privkey.pem;

    # Basic SSL hardening
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Frontend build output (update to your actual dist path)
    root /var/www/delivery-frontend/dist;
    index index.html;

    # API proxy (/api/v1)
    location /api/v1/ {
        proxy_pass http://127.0.0.1:3000/api/v1/;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # For upgrades/websocket compatibility
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Vite/React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
